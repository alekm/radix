services:
  radius:
    build: .
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      DB_HOST: postgres
      DB_NAME: radix
      DB_USER: radix
      DB_PASSWORD: ${DB_PASSWORD}
      RADIUS_SECRET: ${RADIUS_SECRET}
      PMK_CACHE_TTL: ${PMK_CACHE_TTL:-86400}
      TZ: ${TZ:-America/Kentucky/Louisville}
      PGTZ: ${TZ:-America/Kentucky/Louisville}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "8050:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: radix
      DB_USER: radix
      DB_PASSWORD: ${DB_PASSWORD}
      RADIUS_SECRET: ${RADIUS_SECRET}
      RADIUS_HOST: ${RADIUS_HOST:-}
      RADIUS_PORT: 1812
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      TZ: ${TZ:-America/Kentucky/Louisville}
      PGTZ: ${TZ:-America/Kentucky/Louisville}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radix
      POSTGRES_USER: radix
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-America/Kentucky/Louisville}
      PGTZ: ${TZ:-America/Kentucky/Louisville}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Fresh installs: postgres runs every migration in order on first init.
      # Existing installs: deploy.sh re-applies them (all migrations are idempotent).
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
