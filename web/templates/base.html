<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RADIX{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/static/radix-favicon.svg">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <meta name="theme-color" content="#0d1117">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-brand">
    <img class="brand-mark" src="/static/radix-mark.svg" alt="" width="30" height="30">
    <div>
      <span class="brand-name">RADIX</span>
      <span class="brand-sub">PSK Manager</span>
    </div>
  </div>
  <div class="nav-section">
    <p class="nav-label">Navigation</p>
    <ul class="nav-links">
      <li>
        <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">
          <span class="nav-icon">◈</span> Dashboard
        </a>
      </li>
      <li>
        <a href="/accounts" class="{{ 'active' if '/accounts' in request.url.path else '' }}">
          <span class="nav-icon">◉</span> Accounts
        </a>
      </li>
      <li>
        <a href="/bulk" class="{{ 'active' if '/bulk' in request.url.path else '' }}">
          <span class="nav-icon">◫</span> Bulk Create
        </a>
      </li>
      <li>
        <a href="/sessions" class="{{ 'active' if '/sessions' in request.url.path else '' }}">
          <span class="nav-icon">◔</span> Sessions
        </a>
      </li>
      <li>
        <a href="/logs" class="{{ 'active' if '/logs' in request.url.path else '' }}">
          <span class="nav-icon">◎</span> Auth Log
        </a>
      </li>
      <li>
        <a href="/settings" class="{{ 'active' if '/settings' in request.url.path else '' }}">
          <span class="nav-icon">◧</span> Settings
        </a>
      </li>
    </ul>
  </div>
</nav>

<main class="content">
  <header class="page-header">
    <span class="page-title">{% block heading %}{% endblock %}</span>
    {% block header_action %}{% endblock %}
  </header>
  <div class="page-body">
    {% block content %}{% endblock %}
  </div>
</main>

</body>
</html>
